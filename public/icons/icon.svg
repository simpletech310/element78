<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Element 78">
  <!--
    Element 78 — member icon. The brand wordmark, faithful: Anton ELEMENT
    stacked over the bordered "78" tag, ATLANTA tag below. Anton is loaded
    via @font-face so browsers fetch /fonts/Anton-Regular.ttf at render
    time; the gen-icons.mjs build script inlines the same font as a base64
    data URI before sharp rasterizes the PNGs, so the typography is
    pixel-identical in both rendering paths.
  -->
  <defs>
    <style>
      @font-face {
        font-family: "Anton";
        font-style: normal;
        font-weight: 400;
        src: url("/fonts/Anton-Regular.ttf") format("truetype");
      }
    </style>
    <radialGradient id="ground" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#1B2230"/>
      <stop offset="55%" stop-color="#0E131C"/>
      <stop offset="100%" stop-color="#06090E"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#ground)"/>

  <text
    x="512" y="500"
    text-anchor="middle"
    font-family="Anton, Impact, Haettenschweiler, 'Arial Narrow', sans-serif"
    font-size="260"
    font-weight="400"
    letter-spacing="6"
    fill="#F2EEE8"
  >ELEMENT</text>

  <g transform="translate(512 700)">
    <rect x="-150" y="-78" width="300" height="156" rx="8" ry="8"
          fill="none" stroke="#F2EEE8" stroke-width="5"/>
    <text
      x="0" y="50"
      text-anchor="middle"
      font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
      font-size="124"
      font-weight="500"
      letter-spacing="-2"
      fill="#F2EEE8"
    >78</text>
  </g>

  <text
    x="512" y="880"
    text-anchor="middle"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
    font-size="34"
    font-weight="500"
    letter-spacing="22"
    fill="#8FB8D6"
    fill-opacity="0.85"
  >ATLANTA</text>
</svg>
