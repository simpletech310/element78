<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Element 78">
  <!--
    Element 78 — member icon. Mirrors the brand wordmark stacked:
    "ELEMENT" (Impact, condensed bold) over the signature bordered "78" tag.
    Sized for an 8% safe inset on each side so the wordmark never clips.
  -->
  <defs>
    <radialGradient id="ground" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#1B2230"/>
      <stop offset="55%" stop-color="#0E131C"/>
      <stop offset="100%" stop-color="#06090E"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#ground)"/>

  <!-- "ELEMENT" — Impact at 220px lands at ~870px wide with 6px tracking,
       leaving ~80px margin each side. -->
  <text
    x="512" y="500"
    text-anchor="middle"
    font-family="Impact, Haettenschweiler, 'Arial Narrow', 'Helvetica Neue', sans-serif"
    font-size="220"
    font-weight="900"
    letter-spacing="6"
    fill="#F2EEE8"
  >ELEMENT</text>

  <!-- bordered "78" tag, centered below the wordmark -->
  <g transform="translate(512 700)">
    <rect x="-150" y="-78" width="300" height="156" rx="8" ry="8"
          fill="none" stroke="#F2EEE8" stroke-width="5"/>
    <text
      x="0" y="50"
      text-anchor="middle"
      font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
      font-size="124"
      font-weight="500"
      letter-spacing="-2"
      fill="#F2EEE8"
    >78</text>
  </g>

  <!-- ATLANTA tag, sky color, mirrors the "in Atlanta" cue -->
  <text
    x="512" y="880"
    text-anchor="middle"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
    font-size="34"
    font-weight="500"
    letter-spacing="22"
    fill="#8FB8D6"
    fill-opacity="0.85"
  >ATLANTA</text>
</svg>
