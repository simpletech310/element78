<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Element 78 Coach">
  <!--
    Element 78 — coach app icon.
    Same skeleton as the member icon but with the electric-deep accent ring
    and a "COACH" label below the mark, so coaches landing on the home
    screen can tell their two installs apart at a glance.
  -->
  <defs>
    <radialGradient id="ground" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1F2738"/>
      <stop offset="55%" stop-color="#10151E"/>
      <stop offset="100%" stop-color="#06090E"/>
    </radialGradient>
    <linearGradient id="seven" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BD2F4"/>
      <stop offset="100%" stop-color="#2E7FB0"/>
    </linearGradient>
    <linearGradient id="eight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BD2F4"/>
      <stop offset="100%" stop-color="#2E7FB0"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <rect width="1024" height="1024" fill="url(#ground)"/>

  <!-- thin frame -->
  <rect x="56" y="56" width="912" height="912" rx="16" ry="16"
        fill="none" stroke="#4DA9D6" stroke-opacity="0.32" stroke-width="3"/>

  <!-- corner ticks (electric instead of sky-soft) -->
  <g stroke="#4DA9D6" stroke-opacity="0.85" stroke-width="3" fill="none">
    <path d="M86 142 L86 86 L142 86"/>
    <path d="M938 142 L938 86 L882 86"/>
    <path d="M86 882 L86 938 L142 938"/>
    <path d="M938 882 L938 938 L882 938"/>
  </g>

  <!-- COACH halo ring around the "78" -->
  <circle cx="512" cy="540" r="372" fill="none" stroke="#4DA9D6" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="512" cy="540" r="402" fill="none" stroke="#4DA9D6" stroke-opacity="0.10" stroke-width="2" stroke-dasharray="6 8"/>

  <g transform="translate(512 540)">
    <!-- 7 -->
    <g transform="translate(-296 0)" fill="url(#seven)">
      <path d="M -150 -210 L 150 -210 L 150 -114 L -54 -114 Z"/>
      <path d="M 150 -114 L 150 -22 L -32 210 L -150 210 Z"/>
      <rect x="-92" y="-30" width="184" height="22"/>
    </g>

    <!-- 8 -->
    <g transform="translate(296 0)" fill="url(#eight)">
      <path d="M 0 -228
               C 86 -228 154 -176 154 -108
               C 154 -56 116 -16 70 -2
               C 122 14 168 56 168 116
               C 168 188 92 228 0 228
               C -92 228 -168 188 -168 116
               C -168 56 -122 14 -70 -2
               C -116 -16 -154 -56 -154 -108
               C -154 -176 -86 -228 0 -228 Z
               M 0 -134
               C -32 -134 -58 -118 -58 -90
               C -58 -62 -32 -46 0 -46
               C 32 -46 58 -62 58 -90
               C 58 -118 32 -134 0 -134 Z
               M 0 50
               C -42 50 -76 76 -76 118
               C -76 158 -42 184 0 184
               C 42 184 76 158 76 118
               C 76 76 42 50 0 50 Z"
            fill-rule="evenodd"/>
    </g>
  </g>

  <!-- ELEMENT label -->
  <g fill="#F2EEE8" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="50" letter-spacing="32" text-anchor="middle" font-weight="500">
    <text x="512" y="852">ELEMENT</text>
  </g>

  <!-- COACH chip -->
  <g transform="translate(512 920)">
    <rect x="-92" y="-26" width="184" height="42" rx="3" ry="3"
          fill="#4DA9D6" fill-opacity="0.16" stroke="#4DA9D6" stroke-opacity="0.85" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle"
          fill="#7BD2F4" font-family="ui-monospace, Menlo, Consolas, monospace"
          font-size="22" letter-spacing="6" font-weight="500">COACH · 78</text>
  </g>
</svg>
